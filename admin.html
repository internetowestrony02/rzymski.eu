<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel administracyjny | Gabinet Rzymski</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }
        textarea {
            min-height: 100px;
        }
        .btn-admin {
            background: #2c553c;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 0.5rem;
        }
        .btn-danger {
            background: #b34e4e;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .list-item {
            background: #f8f9fa;
            margin-bottom: 0.8rem;
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-actions button {
            margin-left: 8px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }
        hr {
            margin: 1.5rem 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #9b6b43;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-lock"></i> Panel administracyjny</h1>
            <a href="index.html" class="btn-admin" style="background:#9b6b43;"><i class="fas fa-home"></i> Powrót do strony</a>
        </div>
        
        <!-- Sekcja Aktualności -->
        <div class="admin-card">
            <h2><i class="fas fa-newspaper"></i> Zarządzanie aktualnościami</h2>
            <form id="newsForm">
                <input type="hidden" id="newsId" value="">
                <div class="form-group">
                    <label>Tytuł</label>
                    <input type="text" id="newsTitle" required>
                </div>
                <div class="form-group">
                    <label>Data (YYYY-MM-DD)</label>
                    <input type="date" id="newsDate" required>
                </div>
                <div class="form-group">
                    <label>Treść</label>
                    <textarea id="newsContent" required></textarea>
                </div>
                <button type="submit" class="btn-admin">Dodaj / Zaktualizuj</button>
                <button type="button" id="clearNewsForm" class="btn-admin btn-secondary">Wyczyść formularz</button>
            </form>
            <hr>
            <h3>Istniejące wpisy</h3>
            <div id="newsListAdmin"></div>
        </div>
        
        <!-- Sekcja Cennik -->
        <div class="admin-card">
            <h2><i class="fas fa-tags"></i> Zarządzanie cennikiem</h2>
            <form id="pricingForm">
                <input type="hidden" id="pricingId" value="">
                <div class="form-group">
                    <label>Nazwa usługi</label>
                    <input type="text" id="pricingName" required>
                </div>
                <div class="form-group">
                    <label>Cena (np. 200 zł)</label>
                    <input type="text" id="pricingPrice" required>
                </div>
                <button type="submit" class="btn-admin">Dodaj / Zaktualizuj</button>
                <button type="button" id="clearPricingForm" class="btn-admin btn-secondary">Wyczyść</button>
            </form>
            <hr>
            <h3>Pozycje cennika</h3>
            <div id="pricingListAdmin"></div>
        </div>
